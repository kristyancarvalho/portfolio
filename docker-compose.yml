services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-app
    ports:
      - "5173:5173"
      - "4173:4173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  node_modules:
